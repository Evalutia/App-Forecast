version: "3.8"
name: evalutia

services:
  mysql:
    image: mysql:8.0
    container_name: evalutia-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -u "$$MYSQL_USER" -p"$$MYSQL_PASSWORD" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evalutia_net
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: evalutia-adminer
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - evalutia_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: evalutia-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evalutia_net
    restart: unless-stopped

  webapi:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: evalutia-webapi
    env_file:
      - .env
    environment:
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=evalutia;User=evalutia;Password=evalutia;TreatTinyAsBoolean=false;AllowUserVariables=True;CharSet=utf8mb4;SslMode=None;AllowPublicKeyRetrieval=True"
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
      JWT__Secret: ${JWT_SECRET}
      CORS__AllowedOrigins: ${CORS_ORIGINS}
      TZ: ${TZ}
      ASPNETCORE_URLS: "http://0.0.0.0:${WEBAPI_PORT}"
    ports:
      - "${WEBAPI_PORT}:${WEBAPI_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${WEBAPI_PORT}/swagger/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - evalutia_net
    restart: unless-stopped

  python-worker:
    build:
      context: .
      dockerfile: ./services/python-worker/Dockerfile
    container_name: evalutia-python-worker
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - evalutia_net
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: ./services/etl/Dockerfile
    container_name: evalutia-etl
    env_file:
      - .env
    environment:
      - TZ=America/Montevideo
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - evalutia_net
    restart: unless-stopped

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: evalutia-ofelia
    command: daemon --config=/etc/ofelia/config.ini
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Montevideo
    restart: unless-stopped
    networks:
      - evalutia_net

  webapp:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://webapi:${WEBAPI_PORT}"
    container_name: evalutia-webapp
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    ports:
      - "${WEBAPP_PORT}:${WEBAPP_PORT}"
    depends_on:
      webapi:
        condition: service_healthy
    networks:
      - evalutia_net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./webpage:/opt/evalutia/webpage:ro
    networks:
      - evalutia_net

networks:
  evalutia_net:
    external: true
    name: evalutia_evalutia_net

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
