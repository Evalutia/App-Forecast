name: evalutia
services:
  mysql:
    image: mysql:8.0
    container_name: evalutia-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h 127.0.0.1 -u "$$MYSQL_USER" -p"$$MYSQL_PASSWORD" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evalutia_net
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: evalutia-adminer
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    ports:
      - "8082:8080"
    networks:
      - evalutia_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: evalutia-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evalutia_net
    restart: unless-stopped

  webapi:
      build:
        context: .
        dockerfile: ./apps/backend/Dockerfile
      container_name: evalutia-webapi
      env_file:
        - .env
      environment:
        ConnectionStrings__Default: "Server=mysql;Port=3306;Database=evalutia;User=evalutia;Password=evalutia;TreatTinyAsBoolean=false;AllowUserVariables=True;CharSet=utf8mb4;SslMode=None;AllowPublicKeyRetrieval=True"
        JWT__Issuer: ${JWT_ISSUER}
        JWT__Audience: ${JWT_AUDIENCE}
        JWT__Secret: ${JWT_SECRET}
        CORS__AllowedOrigins: ${CORS_ORIGINS}
        TZ: ${TZ}
      depends_on:
        mysql:
          condition: service_healthy
      ports:
        - "8081:8080"
      healthcheck:
        test: ["CMD-SHELL", "curl -fsS http://localhost:8080/swagger/index.html || exit 1"]
        interval: 15s
        timeout: 5s
        retries: 20
      networks:
        - evalutia_net
      restart: unless-stopped

networks:
  evalutia_net:

volumes:
  mysql_data:
